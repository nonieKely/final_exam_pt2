<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation</title>
    <link rel="stylesheet" href="reservation.css">
    <script src="https://kit.fontawesome.com/53791f77b9.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <script src="main.js"></script>
    
</head>
<body>
    

    <div class="reservation_container">
        
        <div class="reservation_left_side">
            <div class="reservation_text_container">
                <h2 class="reservation">Réservation</h2>
                <h2 class="reservation_h2">Vous pouvez le faire dès maintenant</h2>
                <p>C'est un occasion pour vous de décompresser et d'avoir de merveuilleux souvenir.</p>
            </div>
            

                <div class="formulaire">
                    <div class="date_de_reservation">
                        <p>date de venue</p>
                        <input type="date">
                    </div>
                    <div class="date_de_depart">
                        <p>Date de départ</p>
                        <input type="date">
                    </div>
                    <div class="votre_nom">
                        <p>Votre nom</p>
                        <input type="text" placeholder="ex:Joseph Rakoto">
                    </div>
                    <div class="votre_numero">
                        <p>Votre numéro</p>
                        <input type="text" placeholder="vnuméro de téléphone">
                    </div>
                </div>
                <button>
                    Je réserve!
                </button>
        </div>

        <div class="reservation_right_side">
            <div class="reservation_image_container">
                <img src="images/320362696_897356781630472_1264962660336226523_n.jpg" alt="land image">
                
            </div>
        </div>
        
    </div>
</body>
</html>
